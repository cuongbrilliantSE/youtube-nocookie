workflows:
  ios-build:
    name: Build iOS (Unsigned IPA)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: latest
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Capacitor Sync
        script: npx cap sync ios
      - name: Xcode Build (Unsigned)
        script: |
          xcodebuild -workspace ios/App/App.xcworkspace -scheme App -sdk iphoneos -configuration Release -derivedDataPath build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
      - name: Package Unsigned IPA
        script: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/App.app Payload/
          zip -r App.ipa Payload
    artifacts:
      - App.ipa

  android-build:
    name: Build Android (Debug APK)
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      node: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Capacitor Sync
        script: npx cap sync android
      - name: Build Android Debug APK
        script: |
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
